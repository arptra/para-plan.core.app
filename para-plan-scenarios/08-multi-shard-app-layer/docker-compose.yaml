version: "3.9"
services:
  pg1:
    image: postgres:15-alpine
    environment: { POSTGRES_USER: paraplan, POSTGRES_PASSWORD: paraplan, POSTGRES_DB: shard1 }
    ports: ["5411:5432"]
  pg2:
    image: postgres:15-alpine
    environment: { POSTGRES_USER: paraplan, POSTGRES_PASSWORD: paraplan, POSTGRES_DB: shard2 }
    ports: ["5412:5432"]
