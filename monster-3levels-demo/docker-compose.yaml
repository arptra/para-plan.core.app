version: "3.9"
services:
  pg:
    image: postgres:16
    container_name: monster3_pg
    environment:
      POSTGRES_USER: paraplan
      POSTGRES_PASSWORD: paraplan
      POSTGRES_DB: demo
    ports:
      - "5411:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paraplan -d demo"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./db:/docker-entrypoint-initdb.d:ro
